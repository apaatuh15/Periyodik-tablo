<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Element Detayı</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#06060f;--bg2:#0d0d1c;--bg3:#141428;--border:rgba(255,255,255,0.07);--text:#dde0f0;--muted:#555580;--accent:#4cc9f0;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden;}
.page{max-width:1000px;margin:0 auto;padding:20px;}
.back{display:inline-flex;align-items:center;gap:8px;color:var(--muted);text-decoration:none;font-size:13px;margin-bottom:16px;transition:color .2s;}
.back:hover{color:var(--accent);}

/* ATOM VIEWER */
.atom-viewer{
  width:100%;height:440px;
  border-radius:20px;border:1px solid var(--border);
  overflow:hidden;position:relative;margin-bottom:20px;
  background:radial-gradient(ellipse at 50% 50%, #0c0c22 0%, #06060f 100%);
  cursor:grab;
}
.atom-viewer:active{cursor:grabbing;}
#atomCanvas{display:block;width:100%;height:100%;}
.atom-overlay{position:absolute;top:18px;left:22px;pointer-events:none;user-select:none;}
.ov-sym{font-family:'Space Mono',monospace;font-size:58px;font-weight:700;line-height:1;letter-spacing:-2px;text-shadow:0 0 40px var(--accent);}
.ov-name{font-size:14px;font-weight:300;color:rgba(255,255,255,0.45);margin-top:3px;}
.ov-z{font-family:'Space Mono',monospace;font-size:10px;color:rgba(255,255,255,0.25);margin-top:5px;letter-spacing:.05em;}

/* BOTTOM GRID */
.bottom{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
@media(max-width:600px){.bottom{grid-template-columns:1fr;}}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:20px;}
.props{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px;}
.prop{background:var(--bg3);border-radius:10px;padding:9px 12px;}
.plabel{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px;}
.pval{font-family:'Space Mono',monospace;font-size:14px;font-weight:700;}
.ulabel{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px;}
.utext{font-size:13px;line-height:1.6;}
.disc{font-size:11px;color:var(--muted);margin-top:8px;}
</style>
</head>
<body>
<div class="page">
  <a class="back" href="index.html">← Periyodik Tabloya Dön</a>
  <div class="atom-viewer">
    <canvas id="atomCanvas"></canvas>
    <div class="atom-overlay">
      <div class="ov-sym" id="ovSym"></div>
      <div class="ov-name" id="ovName"></div>
      <div class="ov-z"  id="ovZ"></div>
    </div>
  </div>

  <div class="bottom">
    <div class="card">
      <div class="props">
        <div class="prop"><div class="plabel">Atom No</div><div class="pval" id="pZ"></div></div>
        <div class="prop"><div class="plabel">Atom Kütlesi</div><div class="pval" id="pM"></div></div>
        <div class="prop"><div class="plabel">Periyot</div><div class="pval" id="pP"></div></div>
        <div class="prop"><div class="plabel">Grup</div><div class="pval" id="pG"></div></div>
      </div>
      <div class="ulabel">Kullanım Alanları</div>
      <div class="utext" id="pUses"></div>
      <div class="disc" id="pDisc"></div>
    </div>
  </div>
</div>

<script src="elements_data.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
/* ─── Data ─── */
const params = new URLSearchParams(location.search);
const Z = parseInt(params.get('z')) || 1;
const el = ELEMENTS.find(e => e.z === Z);
if (!el) { document.body.innerHTML='<p style="padding:40px;color:#fff">Element bulunamadı.</p>'; throw ''; }

const CCAT = {alkali:'#ff6b35',alkaline:'#ffcc88',transition:'#4ecdc4',metal:'#aab0cc',
              metalloid:'#6bcb77',nonmetal:'#ff6b6b',halogen:'#cc77ff',noble:'#4cc9f0',
              lanthanide:'#f72585',actinide:'#ff9a3c'};
const accent = CCAT[el.category] || '#4cc9f0';
document.documentElement.style.setProperty('--accent', accent);
document.title = el.sym + ' — ' + el.name;

document.getElementById('ovSym').textContent = el.sym;
document.getElementById('ovSym').style.color = accent;
document.getElementById('ovName').textContent = el.name;
document.getElementById('ovZ').textContent = 'Z = ' + el.z + '   ·   ' + el.mass + ' u   ·   ' + el.shells.reduce((a,b)=>a+b,0) + ' elektron';
document.getElementById('pZ').textContent = el.z;
document.getElementById('pM').textContent = el.mass + ' u';
document.getElementById('pP').textContent = el.period + '. Periyot';
document.getElementById('pG').textContent = el.group + '. Grup';
document.getElementById('pUses').textContent = el.uses;
document.getElementById('pDisc').textContent = 'Keşif: ' + el.discovery;

/* ─── Three.js atom ─── */
const canvas = document.getElementById('atomCanvas');
const renderer = new THREE.WebGLRenderer({canvas, antialias:true, alpha:true});
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setClearColor(0x000000, 0);

const scene = new THREE.Scene();
const cam = new THREE.PerspectiveCamera(45, 1, 0.1, 500);
cam.position.z = 14;

function onResize() {
  const w = canvas.clientWidth, h = canvas.clientHeight;
  renderer.setSize(w, h, false);
  cam.aspect = w / h;
  cam.updateProjectionMatrix();
}
onResize();
new ResizeObserver(onResize).observe(canvas);

/* glow sprite texture */
function makeGlowTex(color) {
  const c = document.createElement('canvas'); c.width=128; c.height=128;
  const g = c.getContext('2d');
  const gr = g.createRadialGradient(64,64,0,64,64,64);
  gr.addColorStop(0, color+'ff'); gr.addColorStop(0.35, color+'88'); gr.addColorStop(1, color+'00');
  g.fillStyle=gr; g.fillRect(0,0,128,128);
  return new THREE.CanvasTexture(c);
}
const glowTex   = makeGlowTex(accent.replace('#','#'));
const eGlowTex  = makeGlowTex('#ffffff');

/* Nucleus */
const nucMesh = new THREE.Mesh(
  new THREE.SphereGeometry(0.52, 32, 32),
  new THREE.MeshPhongMaterial({color:new THREE.Color(accent), emissive:new THREE.Color(accent), emissiveIntensity:0.6})
);
scene.add(nucMesh);
const nucGlow = new THREE.Sprite(new THREE.SpriteMaterial({map:glowTex,transparent:true,blending:THREE.AdditiveBlending,depthWrite:false}));
nucGlow.scale.set(3,3,1); scene.add(nucGlow);

/* Lights */
scene.add(new THREE.AmbientLight(0xffffff, 0.5));
const pl = new THREE.PointLight(new THREE.Color(accent), 2.5, 30);
pl.position.set(0,0,6); scene.add(pl);

/* Starfield */
const sPos = new Float32Array(400*3);
for(let i=0;i<400*3;i++) sPos[i]=(Math.random()-.5)*100;
const starGeo = new THREE.BufferGeometry();
starGeo.setAttribute('position', new THREE.BufferAttribute(sPos,3));
scene.add(new THREE.Points(starGeo, new THREE.PointsMaterial({color:0xffffff,size:.07,transparent:true,opacity:.3})));

/* Orbits + electrons */
// Unique tilt axes for each shell — gives beautiful 3D criss-cross look
const TILTS = [
  new THREE.Euler(0,           0,           0),
  new THREE.Euler(Math.PI/2,   0,           0),
  new THREE.Euler(Math.PI/4,   Math.PI/3,   0),
  new THREE.Euler(Math.PI*0.6, Math.PI/5,   Math.PI/4),
  new THREE.Euler(Math.PI/3,   Math.PI*0.7, 0.3),
  new THREE.Euler(0.9,         0.4,         Math.PI/2),
  new THREE.Euler(Math.PI/5,   Math.PI*0.8, 0.8),
];

const orbitData = [];
const accentCol = new THREE.Color(accent);

el.shells.forEach((eCount, si) => {
  const R = 1.6 + si * 1.05;
  const tilt = TILTS[si % TILTS.length];

  /* Ring */
  const ring = new THREE.Mesh(
    new THREE.TorusGeometry(R, 0.013, 8, 128),
    new THREE.MeshBasicMaterial({color: accentCol, transparent:true, opacity:0.2})
  );
  ring.rotation.copy(tilt);
  scene.add(ring);

  /* Pivot group (orbit plane, tilted) */
  const orbitGroup = new THREE.Group();
  orbitGroup.rotation.copy(tilt);
  scene.add(orbitGroup);

  const eMeshes = [];
  for (let i=0; i<eCount; i++) {
    // Each electron gets its own sub-pivot to spread them evenly around the orbit
    const ePivot = new THREE.Group();
    ePivot.rotation.y = (2*Math.PI*i/eCount);
    orbitGroup.add(ePivot);

    const eMesh = new THREE.Mesh(
      new THREE.SphereGeometry(0.11, 12, 12),
      new THREE.MeshPhongMaterial({color:0xffffff, emissive:0xffffff, emissiveIntensity:0.9})
    );
    eMesh.position.x = R;
    ePivot.add(eMesh);

    // electron glow
    const eg = new THREE.Sprite(new THREE.SpriteMaterial({map:eGlowTex,transparent:true,blending:THREE.AdditiveBlending,depthWrite:false}));
    eg.scale.set(0.55,0.55,1);
    eMesh.add(eg);

    eMeshes.push(ePivot);
  }

  const dir = si % 2 === 0 ? 1 : -1;
  const speed = 0.007 / (si * 0.35 + 1) * dir;
  orbitData.push({orbitGroup, ring, eMeshes, speed});
});

/* Scene wrapper for mouse drag */
const root = new THREE.Group();
while(scene.children.length) root.add(scene.children[0]);
scene.add(root);

/* Drag */
let drag=false, px=0, py=0;
canvas.addEventListener('mousedown',  e=>{drag=true;  px=e.clientX; py=e.clientY;});
canvas.addEventListener('touchstart', e=>{drag=true;  px=e.touches[0].clientX; py=e.touches[0].clientY;},{passive:true});
window.addEventListener('mouseup',  ()=>drag=false);
window.addEventListener('touchend', ()=>drag=false);
window.addEventListener('mousemove', e=>{
  if(!drag) return;
  root.rotation.y += (e.clientX-px)*0.007;
  root.rotation.x += (e.clientY-py)*0.007;
  px=e.clientX; py=e.clientY;
});
window.addEventListener('touchmove', e=>{
  if(!drag) return;
  root.rotation.y += (e.touches[0].clientX-px)*0.007;
  root.rotation.x += (e.touches[0].clientY-py)*0.007;
  px=e.touches[0].clientX; py=e.touches[0].clientY;
},{passive:true});

let t=0;
function render() {
  requestAnimationFrame(render);
  t++;

  if(!drag) root.rotation.y += 0.0025;

  // nucleus pulse
  const p = 1 + 0.045*Math.sin(t*0.045);
  nucMesh.scale.setScalar(p);
  nucGlow.scale.set(3*p,3*p,1);

  // orbit electrons
  orbitData.forEach(od => {
    od.orbitGroup.rotation.z += od.speed;
  });

  renderer.render(scene, cam);
}
render();
</script>
</body>
</html>
